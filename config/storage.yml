local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

amazon:
  service: S3
  access_key_id: <%= ENV.fetch("AWS_ACCESS_KEY_ID", "minio") %>
  secret_access_key: <%= ENV.fetch("AWS_SECRET_ACCESS_KEY", "miniopassword") %>
  region: <%= ENV.fetch("AWS_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("AWS_BUCKET", "fibe-rails") %>
  endpoint: <%= ENV.fetch("AWS_ENDPOINT", "http://localhost:9000") %>
  force_path_style: true
